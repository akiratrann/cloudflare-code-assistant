name = "cloudflare-code-assistant"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[durable_objects]
bindings = [
  { name = "CODING_ASSISTANT_AGENT", class_name = "CodingAssistantAgent" }
]

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "cf-coding-assistant-index"

[workflows]
bindings = [
  { name = "REPO_INDEXER_WORKFLOW", workflow_name = "repo-indexer" }
]

